kind = "mobile"
previewPath = "/"
title = "مرسول - توصيل سريع"
version = "1.0.0"
id = "artifacts/marsool"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19377

[services.development]
run = "pnpm --filter @workspace/marsool run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/marsool", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/marsool", "run", "serve" ]

[services.env]
PORT = "19377"
BASE_PATH = "/"
